apiVersion: apps/v1
kind: Deployment
metadata:
  name: budgeit-fe
  namespace: budgeit-fe
spec:
  replicas: 1
  selector:
    matchLabels:
      app: budgeit-fe
  template:
    metadata:
      labels:
        app: budgeit-fe
    spec:
      imagePullSecrets:
        - name: ghcr-credentials
      containers:
        - name: budgeit-fe
          image: ghcr.io/budgeit-app/budgeit-fe:f5b8502246ab5a0f34f78d2734f99841faa488a5
          ports:
            - containerPort: 80