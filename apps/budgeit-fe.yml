apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: budgeit-fe
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/budgeit-app/cluster-config.git
    targetRevision: main
    path: ./manifests/budgeit-fe

  destination:
    server: https://kubernetes.default.svc
    namespace: budgeit-fe-prod

  syncPolicy:
    syncOptions:
      - CreateNamespace=true
    automated:
      prune: true
      selfHeal: true